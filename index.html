<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1>💰 Budget Visualizer</h1>
      <button id="themeToggle" class="btn-icon" aria-label="Toggle dark/light mode">🌙</button>
    </header>

    <!-- Balance Card -->
    <section class="balance-card" aria-label="Total Balance">
      <p class="balance-label">Total Balance</p>
      <h2 class="balance-amount" id="totalBalance">$0.00</h2>
    </section>

    <!-- Input Form -->
    <section class="card form-section">
      <h3>Add Transaction</h3>
      <form id="transactionForm" novalidate>
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input type="text" id="itemName" placeholder="e.g. Lunch" autocomplete="off" />
          <span class="error-msg" id="nameError"></span>
        </div>
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="e.g. 12.50" min="0.01" step="0.01" />
          <span class="error-msg" id="amountError"></span>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="">-- Select Category --</option>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Fun">🎉 Fun</option>
          </select>
          <span class="error-msg" id="categoryError"></span>
        </div>
        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <!-- Controls: Sort + Spending Limit -->
    <section class="card controls-section">
      <div class="control-group">
        <label for="sortSelect">Sort by</label>
        <select id="sortSelect">
          <option value="date-desc">Newest First</option>
          <option value="date-asc">Oldest First</option>
          <option value="amount-desc">Amount (High → Low)</option>
          <option value="amount-asc">Amount (Low → High)</option>
          <option value="category">Category (A–Z)</option>
        </select>
      </div>
      <div class="control-group">
        <label for="spendingLimit">Spending Limit ($)</label>
        <input type="number" id="spendingLimit" placeholder="e.g. 50" min="0" step="0.01" />
      </div>
    </section>

    <!-- Transaction List -->
    <section class="card list-section">
      <h3>Transactions</h3>
      <ul id="transactionList" class="transaction-list" aria-live="polite">
        <li class="empty-state" id="emptyState">No transactions yet. Add one above!</li>
      </ul>
    </section>

    <!-- Pie Chart -->
    <section class="card chart-section">
      <h3>Spending by Category</h3>
      <div class="chart-wrapper">
        <canvas id="spendingChart" aria-label="Pie chart of spending by category"></canvas>
      </div>
    </section>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
